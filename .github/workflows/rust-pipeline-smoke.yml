name: Rust Pipeline Smoke

on:
  push:
    branches:
      - main
      - steer/develop
      - steer/dy
  pull_request:

jobs:
  core-quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: core

      - name: Rust format check
        run: cargo fmt --manifest-path core/Cargo.toml --all -- --check

      - name: Rust check
        run: cargo check --manifest-path core/Cargo.toml

      - name: Rust clippy (deny warnings)
        run: cargo clippy --manifest-path core/Cargo.toml --all-targets --all-features -- -D warnings

      - name: Rust tests
        run: cargo test --manifest-path core/Cargo.toml -q

  web-quality:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Web build
        run: npm run build

      - name: Web lint
        run: npm run lint

  python-quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-collector.txt
          pip install pytest

      - name: Pytest
        run: pytest -q

  smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: core

      - name: Build Rust pipeline binaries
        run: |
          cargo build --manifest-path core/Cargo.toml \
            --bin collector_rs \
            --bin build_sessions_rs \
            --bin build_routines_rs \
            --bin build_handoff_rs

      - name: Unit tests (collector pipeline)
        run: cargo test --manifest-path core/Cargo.toml collector_pipeline -- --nocapture

      - name: Smoke run (empty db)
        env:
          STEER_DB_PATH: /tmp/steer_ci.db
        run: |
          ./core/target/debug/build_sessions_rs --since-hours 1 --use-state --dry-run
          ./core/target/debug/build_routines_rs --days 1 --min-support 1 --use-state --dry-run
          ./core/target/debug/build_handoff_rs --dry-run
          bash scripts/run_pipeline_rs.sh configs/config.yaml
